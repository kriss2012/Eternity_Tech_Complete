<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eternity Tech: The Padmanabha Enigma</title>
    <!-- External Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">
    
    <style>
        /* --- Global Styles & Variables --- */
        :root {
            --color-primary: #00f2fe;
            --color-secondary: #ff2a6d;
            --color-accent: #4affd1;
            --color-dark: #0a0f1f;
            --color-darker: #050810;
            --color-surface: rgba(15, 23, 42, 0.75);
            --color-border: rgba(0, 242, 254, 0.2);
            --color-text: #e2e8f0;
            --color-text-secondary: #94a3b8;
            --color-success: #39ff14;
            --color-danger: #ff4466;
            --color-gold: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--color-darker);
            color: var(--color-text);
            overflow: hidden;
            min-height: 100vh;
        }

        .sanskrit {
            font-family: 'Noto Sans Devanagari', sans-serif;
            color: var(--color-gold);
        }

        /* --- UI Screens (Loading, Menu, Backstory) --- */
        .ui-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            background: linear-gradient(135deg, var(--color-darker), var(--color-dark));
        }

        .ui-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .ui-modal {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: 16px;
            padding: 40px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.1);
            text-align: center;
            max-width: 800px;
            width: 90%;
        }

        .game-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(45deg, var(--color-accent), var(--color-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 2px;
        }

        .game-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            margin-bottom: 32px;
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        .sanskrit-text {
            font-size: 1.2rem;
            color: var(--color-gold);
            margin: 16px 0;
        }

        /* Loading Bar */
        .loading-bar { width: 300px; height: 4px; background: rgba(0, 0, 0, 0.3); border-radius: 4px; margin: 24px auto; overflow: hidden; }
        .loading-progress { width: 0%; height: 100%; background: linear-gradient(90deg, var(--color-primary), var(--color-accent)); transition: width 0.3s ease; }

        /* Backstory */
        .backstory-text { font-size: 1.1rem; margin-bottom: 20px; opacity: 0; transform: translateY(20px); transition: opacity 0.8s ease, transform 0.8s ease; }
        .backstory-text.visible { opacity: 1; transform: translateY(0); }
        .backstory-skip { position: absolute; top: 20px; right: 20px; background: none; border: 1px solid var(--color-border); color: var(--color-text-secondary); padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: all 0.3s ease; }
        .backstory-skip:hover { border-color: var(--color-primary); color: var(--color-primary); }

        /* Menu Buttons */
        .menu-buttons { display: flex; flex-direction: column; gap: 16px; min-width: 250px; }
        .menu-button { padding: 16px 32px; background: transparent; color: var(--color-text); border: 1px solid var(--color-border); border-radius: 8px; font-size: 1.1rem; font-family: 'Rajdhani', sans-serif; font-weight: 600; cursor: pointer; transition: all 0.3s ease; text-align: center; }
        .menu-button:hover { background: var(--color-primary); border-color: var(--color-primary); color: var(--color-darker); transform: translateY(-3px) scale(1.05); box-shadow: 0 0 20px rgba(0, 242, 254, 0.3); }

        /* --- In-Game Interface --- */
        .game-interface { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; display: none; }
        .game-interface.active { display: block; }
        #game-container { width: 100%; height: 100%; position: relative; }

        /* HUD Elements */
        .game-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 200; }
        .game-hud > * { pointer-events: auto; }
        .hud-element { position: absolute; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 12px; padding: 12px 16px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-shadow: 0 0 20px rgba(0, 0, 0, 0.5); transition: opacity 0.5s, transform 0.5s; }
        .chapter-info-hud { top: 20px; left: 20px; }
        .chapter-info-hud h3 { font-size: 1.2rem; margin-bottom: 8px; color: var(--color-accent); font-family: 'Orbitron'; }

        /* Dialogue Box */
        .dialogue-box { bottom: 40px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; opacity: 0; visibility: hidden; }
        .dialogue-box.active { opacity: 1; visibility: visible; animation: dialogueFadeIn 0.5s ease; }
        .character-name { font-size: 1.2rem; font-weight: 600; color: var(--color-accent); margin-bottom: 12px; }
        .dialogue-text { font-size: 1.1rem; line-height: 1.6; margin-bottom: 16px; min-height: 60px; }
        .dialogue-continue { text-align: right; font-size: 0.8rem; color: var(--color-text-secondary); animation: pulse 2s infinite; }
        .emotion-excited { border-left: 3px solid var(--color-success); }
        .emotion-worried { border-left: 3px solid var(--color-danger); }
        .emotion-determined { border-left: 3px solid var(--color-primary); }
        .emotion-menacing { border-left: 3px solid var(--color-secondary); }

        /* Puzzle Interface */
        .puzzle-container { top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 600px; opacity: 0; visibility: hidden; }
        .puzzle-container.active { opacity: 1; visibility: visible; animation: fadeIn 0.5s ease; }
        .puzzle-title { font-size: 1.5rem; color: var(--color-accent); margin-bottom: 15px; text-align: center; font-family: 'Orbitron'; }
        .puzzle-description { margin-bottom: 25px; text-align: center; }
        .puzzle-grid { display: grid; gap: 10px; margin: 20px 0; justify-content: center; }
        .puzzle-item { padding: 15px; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; cursor: pointer; transition: all 0.3s ease; text-align: center; font-size: 1.2rem; }
        .puzzle-item:hover { border-color: var(--color-primary); background: rgba(0, 242, 254, 0.1); }
        .puzzle-item.selected { border-color: var(--color-accent); background: rgba(74, 255, 209, 0.2); }
        .puzzle-actions { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }

        /* Cipher Wheel Puzzle */
        #cipher-wheel-container { display: none; justify-content: center; align-items: center; margin: 20px 0; min-height: 300px; }
        .cipher-wheel { position: relative; width: 300px; height: 300px; }
        .cipher-ring { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid var(--color-border); border-radius: 50%; transition: transform 0.5s ease; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .cipher-ring:hover { border-color: var(--color-primary); }
        .cipher-ring-1 { width: 300px; height: 300px; }
        .cipher-ring-2 { width: 220px; height: 220px; top: 40px; left: 40px; }
        .cipher-ring-3 { width: 140px; height: 140px; top: 80px; left: 80px; }
        .cipher-symbol { position: absolute; font-size: 1.5rem; transform-origin: center; color: var(--color-accent); }
        #alignment-marker { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-top: 15px solid var(--color-secondary); }

        /* Utility & Animations */
        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%) scale(0.98); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        @keyframes dialogueFadeIn { from { opacity: 0; transform: translate(-50%, 20px) scale(0.98); } to { opacity: 1; transform: translate(-50%, 0) scale(1); } }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .puzzle-container.incorrect { animation: shake 0.5s; }
        @keyframes shake { 0%, 100% { transform: translate(-50%, -50%); } 25% { transform: translate(-52%, -50%); } 75% { transform: translate(-48%, -50%); } }
    </style>
</head>
<body>
    <!-- UI Screens -->
    <div id="loading-screen" class="ui-screen">
        <div class="ui-modal">
            <h1 class="game-title">Eternity Tech</h1>
            <h2 class="game-subtitle">The Padmanabha Enigma</h2>
            <div class="sanskrit-text sanskrit">सत्यम् शिवम् सुन्दरम्</div>
            <div class="loading-bar"><div class="loading-progress"></div></div>
            <p class="loading-text">Calibrating Quantum Core...</p>
        </div>
    </div>

    <div id="backstory-screen" class="ui-screen hidden">
        <button class="backstory-skip">Skip</button>
        <div class="ui-modal" style="text-align: left;">
            <h2 class="backstory-title" style="text-align: center;">The Genesis</h2>
            <div id="backstory-text-container"></div>
        </div>
    </div>

    <div id="main-menu" class="ui-screen hidden">
        <div class="ui-modal">
            <h1 class="game-title">Eternity Tech</h1>
            <p class="game-subtitle">The Padmanabha Enigma</p>
            <div class="menu-buttons">
                <button class="menu-button" id="new-game-btn">New Journey</button>
                <button class="menu-button" id="continue-game-btn">Continue</button>
            </div>
        </div>
    </div>

    <!-- Main Game Interface -->
    <div id="game-interface" class="game-interface">
        <div id="game-container"></div>
        <div class="game-hud">
            <div class="hud-element chapter-info-hud">
                <h3 id="chapter-title"></h3>
                <p id="chapter-location"></p>
            </div>
            <div id="dialogue-box" class="hud-element dialogue-box">
                <div class="character-name" id="character-name"></div>
                <div class="dialogue-text" id="dialogue-text"></div>
                <div class="dialogue-continue"><p>Press SPACE to continue</p></div>
            </div>
            <div id="puzzle-container" class="hud-element puzzle-container">
                <h2 class="puzzle-title" id="puzzle-title"></h2>
                <p class="puzzle-description" id="puzzle-description"></p>
                <div class="puzzle-grid" id="puzzle-grid"></div>
                <div id="cipher-wheel-container">
                    <div class="cipher-wheel">
                        <div id="alignment-marker"></div>
                        <div class="cipher-ring cipher-ring-1" id="cipher-ring-1"></div>
                        <div class="cipher-ring cipher-ring-2" id="cipher-ring-2"></div>
                        <div class="cipher-ring cipher-ring-3" id="cipher-ring-3"></div>
                    </div>
                </div>
                <div class="puzzle-actions">
                    <button class="menu-button" id="check-puzzle-btn">Check</button>
                    <button class="menu-button" id="reset-puzzle-btn">Reset</button>
                    <button class="menu-button" id="close-puzzle-btn">Close</button>
                </div>
            </div>
        </div>
    </div>

<script>
class EternityTechGame {
    constructor() {
        this.scene = null;
        this.camera = null;
        this.renderer = null;
        this.controls = null;
        this.gameState = 'loading';
        
        this.puzzleSystem = new PuzzleSystem(this);
        this.chapterData = this.initChapterData();
        
        this.currentChapter = 1;
        this.currentScene = 1;
        this.currentDialogues = [];
        this.currentDialogueIndex = 0;
        
        this.init();
    }

    init() {
        this.setupEventListeners();
        const progressBar = document.querySelector('.loading-progress');
        progressBar.style.width = '100%';
        setTimeout(() => {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('backstory-screen').classList.remove('hidden');
            this.setState('backstory');
            this.playBackstory();
        }, 1500);
    }
    
    setState(newState) {
        this.gameState = newState;
        console.log("Game state changed to:", newState);
    }

    playBackstory() {
        const backstoryTexts = [
            "In the heart of Mumbai, two siblings are about to change the world...",
            "Krishna and Sakshi Patil, guided by their mentor Parth, have fused ancient Sanskrit with quantum computing.",
            "Today, they unveil 'Eternity Tech', a technology that could solve humanity's greatest problems.",
            "But such powerful knowledge attracts dangerous attention. Their journey begins now.",
            "Welcome to the world of Eternity Tech. सत्यम् शिवम् सुन्दरम्"
        ];
        
        let textIndex = 0;
        const container = document.getElementById('backstory-text-container');
        container.innerHTML = '';
        
        const showNextText = () => {
            if (this.gameState !== 'backstory') return; // Stop if skipped
            if (textIndex < backstoryTexts.length) {
                const textElement = document.createElement('p');
                textElement.className = 'backstory-text';
                textElement.innerHTML = backstoryTexts[textIndex].replace('सत्यम् शिवम् सुन्दरम्', '<span class="sanskrit">सत्यम् शिवम् सुन्दरम्</span>');
                container.appendChild(textElement);
                setTimeout(() => textElement.classList.add('visible'), 100);
                textIndex++;
                setTimeout(showNextText, 2500);
            } else {
                setTimeout(() => this.showMainMenu(), 3000);
            }
        };
        showNextText();
    }

    showMainMenu() {
        if(this.gameState === 'menu') return;
        document.getElementById('backstory-screen').classList.add('hidden');
        document.getElementById('game-interface').classList.remove('active');
        document.getElementById('main-menu').classList.remove('hidden');
        this.setState('menu');
        if (this.renderer) {
            this.renderer.domElement.remove();
            this.renderer.dispose();
            this.renderer = null;
        }
    }

    startNewGame() {
        this.startChapter(1);
    }

    continueGame() {
        this.startNewGame(); // Simplified for this version
    }

    startChapter(chapterNumber) {
        this.currentChapter = chapterNumber;
        this.currentScene = 1;

        document.getElementById('main-menu').classList.add('hidden');
        document.getElementById('game-interface').classList.add('active');
        
        const chapter = this.chapterData[chapterNumber];
        document.getElementById('chapter-title').textContent = `Chapter ${chapterNumber}: ${chapter.title}`;
        document.getElementById('chapter-location').textContent = chapter.location;
        
        this.initThreeJS();
        this.startScene(chapterNumber, 1);
    }
    
    startScene(chapter, scene) {
        this.currentScene = scene;
        const sceneData = this.chapterData[chapter]?.scenes[scene];
        if (!sceneData) {
            this.completeChapter(chapter);
            return;
        }
        
        this.currentDialogues = sceneData.dialogues || [];
        this.currentDialogueIndex = 0;

        if (this.currentDialogues.length > 0) {
            this.showDialogue(this.currentDialogues[0]);
        } else {
            this.handleSceneEnd();
        }
    }

    handleSceneEnd() {
        document.getElementById('dialogue-box').classList.remove('active');
        const sceneData = this.chapterData[this.currentChapter].scenes[this.currentScene];
        
        if (sceneData.puzzle) {
            this.showPuzzle(sceneData.puzzle);
        } else if (sceneData.action) {
            sceneData.action();
        }
    }

    showDialogue(dialogue) {
        const dialogueBox = document.getElementById('dialogue-box');
        dialogueBox.className = 'hud-element dialogue-box'; // Reset classes
        if (dialogue.emotion) {
            dialogueBox.classList.add(`emotion-${dialogue.emotion}`);
        }
        document.getElementById('character-name').textContent = dialogue.c;
        document.getElementById('dialogue-text').innerHTML = dialogue.t.replace(/<sanskrit>(.*?)<\/sanskrit>/g, '<span class="sanskrit">$1</span>');
        dialogueBox.classList.add('active');
        this.setState('dialogue');
    }

    nextDialogue() {
        if (this.gameState !== 'dialogue') return;
        this.currentDialogueIndex++;
        if (this.currentDialogueIndex < this.currentDialogues.length) {
            this.showDialogue(this.currentDialogues[this.currentDialogueIndex]);
        } else {
            this.handleSceneEnd();
        }
    }

    showPuzzle(puzzleData) {
        this.setState('puzzle');
        this.puzzleSystem.generatePuzzle(puzzleData);
        document.getElementById('puzzle-container').classList.add('active');
    }

    closePuzzle() {
        document.getElementById('puzzle-container').classList.remove('active');
        this.setState('playing');
    }

    completeChapter(chapter) {
        alert(`Chapter ${chapter} complete!`);
        const nextChapter = chapter + 1;
        if (this.chapterData[nextChapter]) {
            this.startChapter(nextChapter);
        } else {
            alert("Congratulations! You've finished The Padmanabha Enigma!");
            this.showMainMenu();
        }
    }

    initThreeJS() {
        const container = document.getElementById('game-container');
        if (!container || this.renderer) return;

        const computedStyle = getComputedStyle(document.documentElement);
        const darkerColor = computedStyle.getPropertyValue('--color-darker').trim();
        const primaryColor = computedStyle.getPropertyValue('--color-primary').trim();

        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(darkerColor);
        this.scene.fog = new THREE.Fog(darkerColor, 10, 30);

        this.camera = new THREE.PerspectiveCamera(60, container.clientWidth / container.clientHeight, 0.1, 1000);
        this.camera.position.set(0, 3, 8);

        this.renderer = new THREE.WebGLRenderer({ antialias: true });
        this.renderer.setSize(container.clientWidth, container.clientHeight);
        this.renderer.setPixelRatio(window.devicePixelRatio);
        this.renderer.shadowMap.enabled = true;
        container.appendChild(this.renderer.domElement);

        this.controls = new THREE.OrbitControls(this.camera, this.renderer.domElement);
        this.controls.enableDamping = true;
        this.controls.maxPolarAngle = Math.PI / 2.1;

        const ambient = new THREE.AmbientLight(0x404080, 0.5);
        this.scene.add(ambient);
        const keyLight = new THREE.DirectionalLight(primaryColor, 0.8);
        keyLight.position.set(-5, 5, 5);
        keyLight.castShadow = true;
        this.scene.add(keyLight);
        
        this.createChapterEnvironment(this.currentChapter);
        this.animate();
    }
    
    animate() {
        if (!this.renderer) return;
        requestAnimationFrame(() => this.animate());
        this.controls.update();
        this.renderer.render(this.scene, this.camera);
    }
    
    setupEventListeners() {
        document.querySelector('.backstory-skip').addEventListener('click', () => this.showMainMenu());
        document.getElementById('new-game-btn').addEventListener('click', () => this.startNewGame());
        document.getElementById('continue-game-btn').addEventListener('click', () => this.continueGame());
        document.getElementById('check-puzzle-btn').addEventListener('click', () => this.puzzleSystem.checkSolution());
        document.getElementById('reset-puzzle-btn').addEventListener('click', () => this.puzzleSystem.resetPuzzle());
        document.getElementById('close-puzzle-btn').addEventListener('click', () => this.closePuzzle());
        
        window.addEventListener('keydown', (e) => this.handleKeyPress(e));
        window.addEventListener('resize', () => this.onWindowResize());
    }

    handleKeyPress(e) {
        if (e.code === 'Space' && this.gameState === 'dialogue') {
            e.preventDefault();
            this.nextDialogue();
        }
        if (e.code === 'Escape' && (this.gameState === 'playing' || this.gameState === 'puzzle')) {
            this.showMainMenu();
        }
    }
    
    onWindowResize() {
        if (!this.renderer) return;
        const container = document.getElementById('game-container');
        this.camera.aspect = container.clientWidth / container.clientHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(container.clientWidth, container.clientHeight);
    }

    initChapterData() {
        return {
            1: {
                title: "Code of the Ancients", location: "Mumbai, Eternity Tech HQ", scenes: {
                    1: { dialogues: [{c:"Krishna", t:"Today, we prove that our shastras aren't just philosophy—they're the future!", emotion: "determined"}], action: () => this.startScene(1, 2) },
                    2: {
                        dialogues: [{c:"Sakshi", t:"Panini created 4,000 grammatical rules without a computer. Imagine what we can do WITH one.", emotion: "excited"}],
                        puzzle: { type: "sanskrit_sequence", title: "Vedic OS Algorithm", desc: "Arrange the Sanskrit code sequence to optimize the quantum algorithm.", items: ["ॐ", "गणेशाय", "नमः", "सरस्वत्यै", "विद्या", "दान"], solution: ["ॐ", "गणेशाय", "नमः", "सरस्वत्यै", "विद्या", "दान"] },
                        action: () => this.startScene(1, 3)
                    },
                    3: {
                        dialogues: [{c:"Parth", t:"Krishna! Someone's been stealing our research! This drive... it has a map, Sanskrit coordinates..."}, {c:"Gunman", t:"Hand over the drive, old man!"}, {c:"Parth", t:"Never! ...Temple... Vault B... don't let evil win...", emotion:"worried"}],
                        action: () => this.completeChapter(1)
                    }
                }
            },
            2: {
                title: "The Sanskrit Cipher", location: "Mumbai Streets", scenes: {
                    1: { dialogues: [{c:"Krishna", t:"Parth's sacrifice won't be wasted. The cipher he saved... it's our responsibility now.", emotion: "determined"}], action: () => this.startScene(2, 2) },
                    2: {
                        dialogues: [{c:"Sakshi", t:"This isn't just code. It's Vedic astronomy mixed with quantum encryption. Look! Coordinates... Kerala... Padmanabhaswamy Temple!"}],
                        puzzle: { type: "rune_alignment", title: "Decrypt Parth's Cipher", desc: "Align the ancient symbols based on Vedic astronomy to reveal the hidden coordinates.", rings: [['सूर्य', 'α', 'β'], ['चन्द्र', 'δ', 'ε'], ['मंगल', 'η', 'θ']], solution: ['सूर्य', 'चन्द्र', 'मंगल'] },
                        action: () => this.completeChapter(2)
                    }
                }
            },
            3: {
                title: "The Arora Gambit", location: "Mumbai - Chase", scenes: {
                    1: { dialogues: [{c:"Viren Arora", t:"Mr. Patil, you have something that belongs to me. 24 hours to surrender the cipher, or your company burns.", emotion: "menacing"}], action: () => this.startScene(3, 2) },
                    2: {
                        dialogues: [{c:"Krishna", t:"We have to escape the city. Viren's men are everywhere."}],
                        puzzle: { type: "path_choice", title: "Escape Through Dharavi", desc: "Choose the safest route to evade Viren's agents and the police.", items: ["Main Roads", "Rooftops", "Alleyways", "Sewers"], solution: "Rooftops" },
                        action: () => this.completeChapter(3)
                    }
                }
            },
             4: {
                title: "Backwater Mysteries", location: "Kerala Journey", scenes: {
                    1: { dialogues: [{c:"Old Man", t:"You go to Anantha Padmanabha Swamy? Some mysteries aren't meant to be opened. When gods hide something, they have good reason."}], action: () => this.startScene(4, 2)},
                    2: {
                        dialogues: [{c:"Dr. Iyer", t:"I knew your arrival was destined. Vault B contains knowledge that could heal the world... or destroy it. Ancient molecular medicine."}],

    createChapterEnvironment(chapter) {
        while(this.scene.children.length > 0){ this.scene.remove(this.scene.children[0]); }
        const computedStyle = getComputedStyle(document.documentElement);
        const primaryColor = computedStyle.getPropertyValue('--color-primary').trim();
        const ambient = new THREE.AmbientLight(0x404080, 0.5); this.scene.add(ambient);
        const keyLight = new THREE.DirectionalLight(primaryColor, 0.8);
        keyLight.position.set(-5, 5, 5); keyLight.castShadow = true; this.scene.add(keyLight);
        const groundGeometry = new THREE.PlaneGeometry(100, 100);
        const groundMaterial = new THREE.MeshLambertMaterial({ color: 0x1a1c30 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; this.scene.add(ground);
        const boxGeometry = new THREE.BoxGeometry(1, 1, 1);
        const material = new THREE.MeshStandardMaterial({ color: primaryColor });
        for(let i = 0; i < 10; i++) {
            const mesh = new THREE.Mesh(boxGeometry, material);
            mesh.position.set((Math.random() - 0.5) * 20, 0.5, (Math.random() - 0.5) * 20);
            mesh.castShadow = true; this.scene.add(mesh);
        }
    }
}

class PuzzleSystem {
    constructor(game) {
        this.game = game;
        this.currentPuzzle = null;
        this.selectedItems = [];
    }

    generatePuzzle(puzzleData) {
        this.currentPuzzle = puzzleData;
        this.selectedItems = [];
        const gridContainer = document.getElementById('puzzle-grid');
        const wheelContainer = document.getElementById('cipher-wheel-container');
        document.getElementById('puzzle-title').textContent = puzzleData.title;
        document.getElementById('puzzle-description').innerHTML = puzzleData.desc.replace(/<sanskrit>(.*?)<\/sanskrit>/g, '<span class="sanskrit">$1</span>');
        gridContainer.style.display = 'none';
        wheelContainer.style.display = 'none';
        if (puzzleData.type === 'sanskrit_sequence' || puzzleData.type === 'path_choice') {
            this.generateGridPuzzle(puzzleData, gridContainer);
        } else if (puzzleData.type === 'rune_alignment') {
            this.generateCipherWheelPuzzle(puzzleData, wheelContainer);
        }
    }
    
    generateGridPuzzle(data, container) {
        container.innerHTML = '';
        container.style.display = 'grid';
        container.style.gridTemplateColumns = `repeat(auto-fit, minmax(120px, 1fr))`;
        const itemsToDisplay = data.type === 'sanskrit_sequence' ? [...data.items].sort(() => 0.5 - Math.random()) : data.items;
        itemsToDisplay.forEach(itemText => {
            const itemEl = document.createElement('div');
            itemEl.className = 'puzzle-item';
            itemEl.innerHTML = `<span class="${data.type === 'sanskrit_sequence' ? 'sanskrit' : ''}">${itemText}</span>`;
            itemEl.onclick = () => this.selectGridItem(itemEl, data.type);
            container.appendChild(itemEl);
        });
    }

    selectGridItem(element, type) {
        if (type === 'path_choice') {
            this.selectedItems = [element.textContent];
            document.querySelectorAll('.puzzle-item').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
        } else {
            const alreadySelected = element.classList.contains('selected');
            if (alreadySelected) {
                element.classList.remove('selected');
                this.selectedItems = this.selectedItems.filter(item => item !== element.textContent);
            } else {
                element.classList.add('selected');
                this.selectedItems.push(element.textContent);
            }
        }
    }

    generateCipherWheelPuzzle(data, container) {
        container.style.display = 'flex';
        this.ringRotations = [0, 0, 0];
        data.rings.forEach((ringSymbols, i) => {
            const ringEl = document.getElementById(`cipher-ring-${i + 1}`);
            ringEl.innerHTML = '';
            ringEl.style.transform = `rotate(0deg)`;
            ringSymbols.forEach((symbol, j) => {
                const angle = (j / ringSymbols.length) * 360;
                const symbolEl = document.createElement('div');
                symbolEl.className = 'cipher-symbol sanskrit';
                symbolEl.textContent = symbol;
                const radius = ringEl.offsetWidth / 2 - 20;
                symbolEl.style.transform = `rotate(${angle}deg) translate(0, -${radius}px) rotate(-${angle}deg)`;
                ringEl.appendChild(symbolEl);
            });
            ringEl.onclick = () => this.rotateRing(i);
        });
    }

    rotateRing(ringIndex) {
        const ringEl = document.getElementById(`cipher-ring-${ringIndex + 1}`);
        const symbolsInRing = this.currentPuzzle.rings[ringIndex].length;
        this.ringRotations[ringIndex] = (this.ringRotations[ringIndex] + 1) % symbolsInRing;
        const rotationAngle = (this.ringRotations[ringIndex] / symbolsInRing) * 360;
        ringEl.style.transform = `rotate(${rotationAngle}deg)`;
    }

    checkSolution() {
        let isCorrect = false;
        const puzzleType = this.currentPuzzle.type;
        if (puzzleType === 'sanskrit_sequence') {
            isCorrect = this.selectedItems.length === this.currentPuzzle.solution.length && 
                        this.selectedItems.every((item, index) => item === this.currentPuzzle.solution[index]);
        } else if (puzzleType === 'rune_alignment') {
            const currentAlignment = this.ringRotations.map((rot, i) => {
                const symbols = this.currentPuzzle.rings[i];
                return symbols[(symbols.length - rot) % symbols.length];
            });
            isCorrect = currentAlignment.every((symbol, i) => symbol === this.currentPuzzle.solution[i]);
        } else if (puzzleType === 'path_choice') {
            isCorrect = this.selectedItems.length === 1 && this.selectedItems[0] === this.currentPuzzle.solution;
        }
        
        if (isCorrect) {
            this.game.closePuzzle();
            const sceneData = this.game.chapterData[this.game.currentChapter].scenes[this.game.currentScene];
            if (sceneData.action) sceneData.action();
        } else {
            const puzzleContainer = document.getElementById('puzzle-container');
            puzzleContainer.classList.add('incorrect');
            setTimeout(()=> puzzleContainer.classList.remove('incorrect'), 500);
        }
    }
    
    resetPuzzle() {
        this.generatePuzzle(this.currentPuzzle);
    }
}
